name: CI
on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: extractions/setup-just@v3
      - run: pnpm install --frozen-lockfile
      - run: just check # typecheck + lint + format-check + test, sequential

  suites:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suite: [integration, e2e, eval]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: extractions/setup-just@v3
      - run: pnpm install --frozen-lockfile
      - name: Run ${{ matrix.suite }} (skips without API key)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "::notice::No OPENAI_API_KEY secret — skipping ${{ matrix.suite }}."
            exit 1
          fi
          just ${{ matrix.suite }}

  summary:
    needs: [static, suites]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Write run summary
        run: |
          {
            echo "## CI run summary"
            echo ""
            echo "| group | result |"
            echo "|---|---|"
            echo "| static + unit (typecheck/lint/format/test) | ${{ needs.static.result }} |"
            echo "| suites (integration/e2e/eval) | ${{ needs.suites.result }} |"
          } >> "$GITHUB_STEP_SUMMARY"
